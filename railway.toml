# Railway — backend API (frontend stays on Vercel)
#
# Builds from monorepo root: Dockerfile lives at backend/Dockerfile.
# Optional: set service Root Directory = backend and use backend/railway.toml instead.
#
# Required env vars on the backend service:
#   APP_ENV=production, API_KEY, DATABASE_URL, CORS_ORIGINS, ENABLE_SCHEDULER=true

[build]
builder = "DOCKERFILE"
dockerfilePath = "backend/Dockerfile"
watchPatterns = ["backend/**"]

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
