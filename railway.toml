# Railway — backend API (frontend stays on Vercel)
#
# Docker build context = repo root; Dockerfile copies backend/ explicitly.
# Do NOT set Root Directory = backend (would break COPY paths).
#
# Required env vars: APP_ENV, API_KEY, DATABASE_URL, CORS_ORIGINS, ENABLE_SCHEDULER

[build]
builder = "DOCKERFILE"
dockerfilePath = "backend/Dockerfile"
watchPatterns = ["backend/**"]

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
